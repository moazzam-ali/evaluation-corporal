<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Navy arc — draws in, holds, draws out -->
  <circle
    cx="60" cy="60" r="45.6"
    stroke="#1A1A2E"
    stroke-width="5.4"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="214.88 71.63"
    stroke-dashoffset="286.51"
    transform="rotate(-225 60 60)"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="286.51; 0; 0; 286.51"
      keyTimes="0; 0.35; 0.75; 1"
      dur="3.8s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
    />
  </circle>

  <!-- Blush face oval — scale from center -->
  <g transform="translate(60, 63.6)">
    <ellipse cx="0" cy="0" rx="33.6" ry="39.6" fill="#F4A7B9">
      <animate
        attributeName="opacity"
        values="0; 1; 1; 1; 0"
        keyTimes="0; 0.25; 0.6; 0.8; 1"
        dur="3.8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
      />
      <animateTransform
        attributeName="transform"
        type="scale"
        values="0; 1; 1; 1; 0"
        keyTimes="0; 0.25; 0.6; 0.8; 1"
        dur="3.8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
      />
    </ellipse>
  </g>

  <!-- Rose dot — pops in with overshoot, pulses, fades -->
  <g transform="translate(49.92, 73.5)">
    <circle cx="0" cy="0" r="4.2" fill="#E8728A">
      <animate
        attributeName="opacity"
        values="0; 0; 1; 1; 1; 1; 0; 0"
        keyTimes="0; 0.34; 0.42; 0.5; 0.55; 0.72; 0.82; 1"
        dur="3.8s"
        repeatCount="indefinite"
      />
      <animateTransform
        attributeName="transform"
        type="scale"
        values="0; 0; 1.3; 1; 1.15; 1; 0; 0"
        keyTimes="0; 0.34; 0.42; 0.48; 0.54; 0.72; 0.82; 1"
        dur="3.8s"
        repeatCount="indefinite"
      />
    </circle>
  </g>

</svg>
